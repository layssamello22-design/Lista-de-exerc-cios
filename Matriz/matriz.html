<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Exercícios - JavaScript | TADS</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css">
</head>
<body>
    <header>
        <h1>Turma de <span>TADS</span></h1>
        <p>Laboratório de Algoritmos com JavaScript 🚀</p>
        <p>Lista de Exercícios 📝</p>
    </header>
    <main>
        <div class="container">
            <h2>📚 Estrutura de Matriz com JavaScript</h2>
            <div id="lista-exercicios"></div>
        </div>
        <button class="voltar" onclick="window.location.href='../index.html'">Voltar</button>
    </main>
<script>
const exercicios = [
   "A Tabela 3x3",
   "A Soma de Todos os Elementos",
   "O Maior da Tabela",
   "A Diagonal Principal",
   "Soma das Linhas",
   "Multiplicando por um Escalar",
   "A Matriz Identidade",
   "Verificador de Jogo da Velha (Linhas)",
   "Transposição de Matriz",
   "Reserva de Poltronas (Cinema)"
];

const lista = document.getElementById("lista-exercicios");

exercicios.forEach((nome, index) => {
  const numero = String(index + 1).padStart(3, "0");

  const card = document.createElement("a");
  card.classList.add("card");

  card.href = `ex${numero}/index.html`;

  card.innerHTML = `
    <div class="icon">📘</div>
    <h2>Ex${numero}</h2>
    <p>${nome}</p>
  `;

  lista.appendChild(card);
});
</script>
</body>
</html>
